<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoralMC - Staff</title>
    <link rel="icon" href="img/logo.png">
    <link rel="stylesheet" href="css/staff.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    Home
                </a>
                <a href="http://rules.coralmc.it/" class="nav-item">
                    <i class="fas fa-scroll"></i>
                    Rules
                </a>
                <a href="https://store.coralmc.it/" class="nav-item store-button">
                    <i class="fas fa-shopping-cart"></i>
                    Store
                </a>
                <a href="vote.html" class="nav-item">
                    <i class="fas fa-vote-yea"></i>
                    Vote
                </a>
                <a href="staff.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    Staff
                </a>
            </div>
        </nav>
        <div class="logo">
            <img src="img/logo2.webp" alt="CoralMC Logo">
            <div class="page-title">STAFFER</div>
        </div>
    </header>

    <main>
        <div class="staff-container">

            <div class="staff-section">
                <h2 class="section-title role-owner">
                    <i class="fas fa-crown"></i> Owner
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="Feryzz">
                        <img src="img/staff/feryzz.png" alt="Feryzz">
                        <div class="staff-info">
                            <h3 class="name role-owner">Feryzz</h3>
                            <span class="role">Owner</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-sradmin">
                    <i class="fas fa-shield-alt"></i> Sr. Admin
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="Telfrancesco">
                        <img src="img/staff/telfrancesco.png" alt="Telfrancesco">
                        <div class="staff-info">
                            <h3 class="name role-sradmin">Telfrancesco</h3>
                            <span class="role">Sr. Admin</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-admin">
                    <i class="fas fa-shield-alt"></i> Admin
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="ShawnFroste">
                        <img src="img/staff/ShawnFroste.png" alt="ShawnFroste">
                        <div class="staff-info">
                            <h3 class="name role-admin">ShawnFroste</h3>
                            <span class="role">Admin</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-srdev">
                    <i class="fas fa-code"></i> Sr. Developer
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="Lafa">
                        <img src="img/staff/Lafa.png" alt="Lafa">
                        <div class="staff-info">
                            <h3 class="name role-srdev">Lafa</h3>
                            <span class="role">Sr. Developer</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-dev">
                    <i class="fas fa-code"></i> Developer
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="Xstream">
                        <img src="img/staff/xstream.png" alt="Xstream">
                        <div class="staff-info">
                            <h3 class="name role-dev">Xstream</h3>
                            <span class="role">Developer</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-srmod">
                    <i class="fas fa-gavel"></i> Sr. Mod
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="roboddino">
                        <img src="img/staff/roboddino.png" alt="roboddino">
                        <div class="staff-info">
                            <h3 class="name role-srmod">roboddino</h3>
                            <span class="role">Sr. Mod</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-jrdev">
                    <i class="fas fa-code"></i> Jr. Developer
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="Prova">
                        <img src="img/staff/Prova.png" alt="Prova">
                        <div class="staff-info">
                            <h3 class="name role-jrdev">Prova</h3>
                            <span class="role">Jr. Developer</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-mod">
                    <i class="fas fa-gavel"></i> Mod
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="Epilettico">
                        <img src="img/staff/epilettico.png" alt="Epilettico">
                        <div class="staff-info">
                            <h3 class="name role-mod">Epilettico</h3>
                            <span class="role">Mod</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="staff-section">
                <h2 class="section-title role-helper">
                    <i class="fas fa-hands-helping"></i> Helper
                </h2>
                <div class="staff-grid">
                    <div class="staff-card" data-name="KanziC">
                        <img src="img/staff/KanziC.png" alt="KanziC">
                        <div class="staff-info">
                            <h3 class="name role-helper">KanziC</h3>
                            <span class="role">Helper</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
